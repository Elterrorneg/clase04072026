webdriver {
  driver = firefox
  autodownload = true
  capabilities {
    browserName = "firefox"
    acceptInsecureCerts = true
    pageLoadStrategy = "normal"
    "moz:firefoxOptions" {
        binary = "/snap/firefox/current/usr/lib/firefox/firefox"
      args = [
        "-private"
      ]
      log {
        level = "info"
      }
    }
    timeouts {
      implicit = 10000
      script = 30000
      pageLoad = 30000
    }
  }
}
headless.mode = false
serenity {
  take.screenshots = AFTER_EACH_STEP
}